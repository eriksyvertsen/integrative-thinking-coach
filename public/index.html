<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Integrative Thinking Coach — USVC</title>
  <link href="https://fonts.googleapis.com/css2?family=Special+Gothic+Expanded+One&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FAF9F5;
      --surface: #ffffff;
      --surface-alt: #F6F6F6;
      --border: #E0DFDB;
      --border-focus: #1C73E8;
      --text: #141413;
      --text-secondary: #6B6E71;
      --accent: #1C73E8;
      --accent-light: #E8F0FE;
      --accent-dark: #1558B0;
      --success: #1A7F5A;
      --success-light: #D6F5E8;
      --warn: #3C4043;
      --warn-light: #ECECEC;
      --secondary: #3C4043;
      --coral: #FF6265;
      --radius: 6px;
      --radius-sm: 4px;
      --shadow: 0 1px 3px rgba(20,20,19,0.06);
      --shadow-lg: 0 8px 24px rgba(20,20,19,0.08);
      --font-display: 'Special Gothic Expanded One', sans-serif;
      --font-body: 'Space Mono', 'Founders Grotesk Mono', monospace;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      min-height: 100vh;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
