<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Integrative Thinking Coach</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --surface-alt: #f4f1fb;
      --border: #e5e5e5;
      --border-focus: #7c3aed;
      --text: #1a1a1a;
      --text-secondary: #6b7280;
      --accent: #7c3aed;
      --accent-light: #ede9fe;
      --accent-dark: #5b21b6;
      --success: #059669;
      --success-light: #d1fae5;
      --warn: #d97706;
      --warn-light: #fef3c7;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-lg: 0 10px 25px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo svg { width: 24px; height: 24px; }

    .stepper {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .step-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      background: transparent;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
    }
    .step-indicator:hover { background: var(--accent-light); }
    .step-indicator.active {
      background: var(--accent);
      color: white;
    }
    .step-indicator.completed {
      background: var(--success-light);
      color: var(--success);
    }
    .step-indicator .num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      background: var(--border);
      color: var(--text-secondary);
    }
    .step-indicator.active .num { background: rgba(255,255,255,0.25); color: white; }
    .step-indicator.completed .num { background: var(--success); color: white; }

    .step-connector {
      width: 20px;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
    }
    .step-connector.done { background: var(--success); }

    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }

    .phase-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px;
      display: none;
    }
    .phase-card.visible { display: block; }

    .phase-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: var(--accent-light);
      color: var(--accent);
      margin-bottom: 12px;
    }

    .phase-title {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .phase-desc {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 28px;
      max-width: 640px;
    }

    .intro-hero {
      text-align: center;
      padding: 48px 24px;
    }
    .intro-hero .icon-large {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: var(--accent-light);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .intro-hero .icon-large svg { width: 36px; height: 36px; color: var(--accent); }
    .intro-hero h1 { font-size: 32px; font-weight: 700; margin-bottom: 12px; }
    .intro-hero p { font-size: 16px; color: var(--text-secondary); max-width: 520px; margin: 0 auto 28px; }

    label.field-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .field-hint {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    textarea, input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
      background: var(--surface);
      transition: border-color 0.15s;
      resize: vertical;
    }
    textarea:focus, input[type="text"]:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-light);
    }
    textarea { min-height: 80px; }

    .field-group { margin-bottom: 20px; }

    .model-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }
    @media (max-width: 640px) {
      .model-columns { grid-template-columns: 1fr; }
      .stepper { display: none; }
    }

    .model-col {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .model-col h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .model-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .model-dot.a { background: var(--accent); }
    .model-dot.b { background: var(--warn); }

    .move-cards {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    @media (max-width: 640px) {
      .move-cards { grid-template-columns: 1fr; }
    }
    .move-card {
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: all 0.15s;
      background: var(--surface);
    }
    .move-card:hover { border-color: var(--accent); background: var(--accent-light); }
    .move-card.selected { border-color: var(--accent); background: var(--accent-light); }
    .move-card h4 { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    .move-card p { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
    .move-card .best-when {
      font-size: 11px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--surface-alt); }
    .btn-success {
      background: var(--success);
      color: white;
    }
    .btn-success:hover { background: #047857; }

    .btn-row {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .btn-row-right { display: flex; gap: 12px; }

    .summary-section {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }
    .summary-section h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 12px;
    }
    .summary-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .summary-label { font-weight: 600; color: var(--text-secondary); }
    .summary-value { white-space: pre-wrap; }

    .mobile-phase-label {
      display: none;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
    }
    @media (max-width: 640px) {
      .mobile-phase-label { display: block; }
    }

    @media print {
      .header, .btn-row, .stepper { display: none !important; }
      .phase-card { display: block !important; border: none; box-shadow: none; padding: 0; }
      .main { padding: 0; }
    }

    .tip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
      background: var(--warn-light);
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--warn);
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>
      Integrative Thinking Coach
    </div>
    <div class="stepper" id="stepper"></div>
    <div class="mobile-phase-label" id="mobileLabel"></div>
  </div>
</div>

<div class="main" id="app"></div>

<script>
const PHASES = [
  { key: 'intro', label: 'Start' },
  { key: 'articulate', label: 'Articulate' },
  { key: 'analyze', label: 'Analyze' },
  { key: 'remix', label: 'Remix' },
  { key: 'test', label: 'Test' },
  { key: 'summary', label: 'Summary' },
];

const state = {
  phase: 0,
  context: '',
  modelA: { name: '', stakeholders: '', jobs: '', outcomes: '', how: '', causal: '', assumptions: '' },
  modelB: { name: '', stakeholders: '', jobs: '', outcomes: '', how: '', causal: '', assumptions: '' },
  loveA: '', loveB: '', mustKeepA: '', mustKeepB: '', tensions: '', surfaceConflicts: '',
  selectedMove: '',
  moveRationale: '', prototype: '', preservedA: '', preservedB: '', leftBehind: '', tensionResolved: '',
  conditions: '', risks: '', assumptions: '', experiment: '', timeline: '', successLooks: '', failureLooks: '', nextStep: '',
};

function save(key, val) { state[key] = val; }
function saveNested(model, key, val) { state[model][key] = val; }

function renderStepper() {
  const el = document.getElementById('stepper');
  const mob = document.getElementById('mobileLabel');
  const display = PHASES.slice(1, 5);
  let html = '';
  display.forEach((p, i) => {
    const phaseIdx = i + 1;
    let cls = '';
    if (state.phase > phaseIdx) cls = 'completed';
    else if (state.phase === phaseIdx) cls = 'active';
    html += `<button class="step-indicator ${cls}" onclick="goPhase(${phaseIdx})">
      <span class="num">${state.phase > phaseIdx ? '\u2713' : i + 1}</span> ${p.label}
    </button>`;
    if (i < display.length - 1) {
      html += `<div class="step-connector ${state.phase > phaseIdx ? 'done' : ''}"></div>`;
    }
  });
  el.innerHTML = html;
  mob.textContent = PHASES[state.phase] ? `Step ${state.phase} of 4 \u2014 ${PHASES[state.phase].label}` : '';
}

function goPhase(n) {
  if (n > state.phase + 1) return;
  state.phase = n;
  render();
}

function next() { state.phase++; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
function prev() { if (state.phase > 0) { state.phase--; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); } }

function field(id, label, hint, val, placeholder, rows) {
  return `<div class="field-group">
    <label class="field-label" for="${id}">${label}</label>
    ${hint ? `<div class="field-hint">${hint}</div>` : ''}
    <textarea id="${id}" rows="${rows || 3}" placeholder="${placeholder || ''}">${val || ''}</textarea>
  </div>`;
}

function textField(id, label, hint, val, placeholder) {
  return `<div class="field-group">
    <label class="field-label" for="${id}">${label}</label>
    ${hint ? `<div class="field-hint">${hint}</div>` : ''}
    <input type="text" id="${id}" value="${val || ''}" placeholder="${placeholder || ''}" />
  </div>`;
}

function renderIntro() {
  return `<div class="phase-card visible">
    <div class="intro-hero">
      <div class="icon-large">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>
      </div>
      <h1>Integrative Thinking Coach</h1>
      <p>Stuck between two imperfect options? This tool walks you through a four-phase process to move beyond either-or thinking and create a solution that captures the best of both alternatives.</p>
    </div>
    ${field('ctx', 'Describe the decision you face', 'What two options feel like they compete with each other? Why does each carry real value?', state.context, 'e.g. We need to decide between building an in-house solution (full control, high cost) vs. buying off-the-shelf (fast, but limited customization)\u2026', 5)}
    <div class="btn-row"><div></div><div class="btn-row-right">
      <button class="btn btn-primary" onclick="saveAndNext('intro')">Begin \u2192 Articulate</button>
    </div></div>
  </div>`;
}

function renderArticulate() {
  return `<div class="phase-card visible">
    <div class="phase-badge">Phase 1 of 4</div>
    <h2 class="phase-title">Articulate</h2>
    <p class="phase-desc">Push each alternative to its extreme. Map out the full logic of each model \u2014 who it serves, what it achieves, and what it assumes.</p>
    <div class="tip">\ud83d\udca1 Give each model a short, vivid name. It makes the rest of the process easier.</div>
    <div class="model-columns">
      <div class="model-col">
        <h3><span class="model-dot a"></span> Model A</h3>
        ${textField('a_name', 'Name', '', state.modelA.name, 'e.g. "Build In-House"')}
        ${field('a_stake', 'Stakeholders', 'Who gets affected by this model?', state.modelA.stakeholders, 'Engineering team, customers, finance\u2026')}
        ${field('a_jobs', 'Jobs to be done', 'What needs get met?', state.modelA.jobs, 'Full control over roadmap, deep integrations\u2026')}
        ${field('a_out', 'Outcomes', 'What results does this model produce?', state.modelA.outcomes, 'Custom-fit product, slower time to market\u2026')}
        ${field('a_how', 'How outcomes get achieved', '', state.modelA.how, 'Dedicated team builds from scratch\u2026')}
        ${field('a_causal', 'Key causal relationships', '', state.modelA.causal, 'More dev investment \u2192 more flexibility, but longer cycles\u2026')}
        ${field('a_assume', 'Underlying assumptions', '', state.modelA.assumptions, 'We can hire fast enough, requirements won\'t change drastically\u2026')}
      </div>
      <div class="model-col">
        <h3><span class="model-dot b"></span> Model B</h3>
        ${textField('b_name', 'Name', '', state.modelB.name, 'e.g. "Buy Off-the-Shelf"')}
        ${field('b_stake', 'Stakeholders', 'Who gets affected by this model?', state.modelB.stakeholders, 'Ops team, customers, vendors\u2026')}
        ${field('b_jobs', 'Jobs to be done', 'What needs get met?', state.modelB.jobs, 'Speed to market, lower upfront cost\u2026')}
        ${field('b_out', 'Outcomes', 'What results does this model produce?', state.modelB.outcomes, 'Fast deployment, vendor dependency\u2026')}
        ${field('b_how', 'How outcomes get achieved', '', state.modelB.how, 'License existing platform, configure to needs\u2026')}
        ${field('b_causal', 'Key causal relationships', '', state.modelB.causal, 'Vendor capability \u2192 our ceiling, lower cost \u2192 less control\u2026')}
        ${field('b_assume', 'Underlying assumptions', '', state.modelB.assumptions, 'Vendor will keep investing in product, our needs are standard enough\u2026')}
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="saveAndPrev('articulate')">\u2190 Back</button>
      <div class="btn-row-right">
        <button class="btn btn-primary" onclick="saveAndNext('articulate')">Next \u2192 Analyze</button>
      </div>
    </div>
  </div>`;
}

function renderAnalyze() {
  const aName = state.modelA.name || 'Model A';
  const bName = state.modelB.name || 'Model B';
  return `<div class="phase-card visible">
    <div class="phase-badge">Phase 2 of 4</div>
    <h2 class="phase-title">Analyze</h2>
    <p class="phase-desc">Identify what you value most in each model, and name the genuine tensions \u2014 the places where these two approaches truly conflict.</p>
    <div class="model-columns">
      <div class="model-col">
        <h3><span class="model-dot a"></span> ${aName}</h3>
        ${field('loveA', 'What do you love about this model?', 'What works well? What feels right?', state.loveA, '')}
        ${field('mustA', 'Must-keep features', 'Non-negotiable value you\'d hate to lose', state.mustKeepA, '')}
      </div>
      <div class="model-col">
        <h3><span class="model-dot b"></span> ${bName}</h3>
        ${field('loveB', 'What do you love about this model?', '', state.loveB, '')}
        ${field('mustB', 'Must-keep features', 'Non-negotiable value you\'d hate to lose', state.mustKeepB, '')}
      </div>
    </div>
    ${field('tensions', 'Genuine tensions', 'Where do these models truly conflict? What makes them feel incompatible?', state.tensions, 'e.g. Control vs. speed \u2014 building gives us control but costs time; buying gives speed but limits flexibility\u2026', 4)}
    ${field('surface', 'Surface-level conflicts (that might dissolve)', 'Conflicts that look real but might not hold under scrutiny', state.surfaceConflicts, 'e.g. "We can\'t afford both" \u2014 but maybe we could phase the investment\u2026')}
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="saveAndPrev('analyze')">\u2190 Articulate</button>
      <div class="btn-row-right">
        <button class="btn btn-primary" onclick="saveAndNext('analyze')">Next \u2192 Remix</button>
      </div>
    </div>
  </div>`;
}

function renderRemix() {
  const moves = [
    { key: 'double-down', title: 'Double-Down', desc: 'Push one model to such an extreme that it begins to deliver the key benefit of the other.', best: 'One model has many strengths with one critical flaw; the other has one vital strength but many flaws.' },
    { key: 'decomposition', title: 'Decomposition', desc: 'Break the problem into parts and apply the best-fitting model to each part separately.', best: 'Both models attract you but can\'t coexist as wholes \u2014 yet their pieces can apply to different jobs.' },
    { key: 'hidden-gem', title: 'Hidden Gem', desc: 'Extract a small, powerful element from each model and build something entirely new around those pieces.', best: 'Two opposing models, both with a balance of good and bad, neither working well in whole form.' },
  ];
  return `<div class="phase-card visible">
    <div class="phase-badge">Phase 3 of 4</div>
    <h2 class="phase-title">Remix</h2>
    <p class="phase-desc">Now the creative work begins. Choose an integrative move and design a new model that resolves the tension between your alternatives.</p>
    <label class="field-label">Choose an integrative move</label>
    <div class="field-hint" style="margin-bottom:12px">Select the approach that best fits your situation. You can try more than one.</div>
    <div class="move-cards">
      ${moves.map(m => `<div class="move-card ${state.selectedMove === m.key ? 'selected' : ''}" onclick="selectMove('${m.key}')">
        <h4>${m.title}</h4>
        <p>${m.desc}</p>
        <div class="best-when"><strong>Best when:</strong> ${m.best}</div>
      </div>`).join('')}
    </div>
    ${field('moveRat', 'Why this move?', 'Brief rationale for choosing this approach', state.moveRationale, '')}
    ${field('proto', 'Describe your integrative prototype', 'What does the new, integrated model look like? Be concrete.', state.prototype, 'e.g. Build a thin integration layer in-house that wraps the off-the-shelf product, giving us control over the customer experience while leveraging the vendor\'s core engine\u2026', 5)}
    <div class="model-columns">
      <div class="model-col">
        <h3><span class="model-dot a"></span> Preserved from ${state.modelA.name || 'A'}</h3>
        ${field('presA', '', '', state.preservedA, 'What carried over from Model A?')}
      </div>
      <div class="model-col">
        <h3><span class="model-dot b"></span> Preserved from ${state.modelB.name || 'B'}</h3>
        ${field('presB', '', '', state.preservedB, 'What carried over from Model B?')}
      </div>
    </div>
    ${field('leftBehind', 'What got left behind (and why)', '', state.leftBehind, '')}
    ${field('tensionRes', 'How the tension gets resolved', 'Why does this integration work where choosing A or B alone did not?', state.tensionResolved, '', 4)}
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="saveAndPrev('remix')">\u2190 Analyze</button>
      <div class="btn-row-right">
        <button class="btn btn-primary" onclick="saveAndNext('remix')">Next \u2192 Test</button>
      </div>
    </div>
  </div>`;
}

function renderTest() {
  return `<div class="phase-card visible">
    <div class="phase-badge">Phase 4 of 4</div>
    <h2 class="phase-title">Test</h2>
    <p class="phase-desc">Before committing, stress-test your prototype. Design a low-cost experiment you can run within the next week.</p>
    ${field('conds', 'Conditions for success', 'Under what circumstances does this integrated model work well?', state.conditions, '', 3)}
    ${field('risks', 'Risk conditions', 'What circumstances could cause this model to fail?', state.risks, '', 3)}
    ${field('assumpts', 'Key assumptions to validate', 'What must hold true for this to work?', state.assumptions, 'e.g. 1) The vendor API supports our custom integration layer. 2) Customers value the custom UX more than raw speed.', 3)}
    ${field('exper', 'Experiment', 'Describe a low-cost way to test your prototype', state.experiment, 'e.g. Build a clickable prototype of the integration layer in one sprint and test it with 5 customers\u2026', 4)}
    ${textField('timeline', 'Timeline', '', state.timeline, 'e.g. Next 2 weeks')}
    ${field('succLooks', 'Success looks like\u2026', '', state.successLooks, '')}
    ${field('failLooks', 'Failure looks like\u2026', '', state.failureLooks, '')}
    ${field('nextStep', 'Your single most important next step', 'What will you do in the next 7 days?', state.nextStep, '', 2)}
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="saveAndPrev('test')">\u2190 Remix</button>
      <div class="btn-row-right">
        <button class="btn btn-success" onclick="saveAndNext('test')">View Summary \u2713</button>
      </div>
    </div>
  </div>`;
}

function renderSummary() {
  const aName = state.modelA.name || 'Model A';
  const bName = state.modelB.name || 'Model B';
  const moveName = { 'double-down': 'Double-Down', 'decomposition': 'Decomposition', 'hidden-gem': 'Hidden Gem' }[state.selectedMove] || state.selectedMove;

  function row(label, val) {
    if (!val) return '';
    return `<div class="summary-row"><div class="summary-label">${label}</div><div class="summary-value">${val.replace(/\n/g, '<br>')}</div></div>`;
  }

  return `<div class="phase-card visible">
    <div class="phase-badge" style="background:${state.successLooks ? 'var(--success-light)' : 'var(--accent-light)'};color:${state.successLooks ? 'var(--success)' : 'var(--accent)'}">Complete</div>
    <h2 class="phase-title">Your Integrative Thinking Summary</h2>
    <p class="phase-desc">Here's everything you worked through. Copy, print, or share this with your team.</p>

    <div class="summary-section">
      <h3>Context</h3>
      ${row('Decision', state.context)}
    </div>

    <div class="summary-section">
      <h3>Phase 1 \u2014 Articulate</h3>
      <div class="model-columns" style="margin-bottom:0">
        <div>
          <strong style="color:var(--accent)">${aName}</strong>
          ${row('Stakeholders', state.modelA.stakeholders)}
          ${row('Jobs', state.modelA.jobs)}
          ${row('Outcomes', state.modelA.outcomes)}
          ${row('How', state.modelA.how)}
          ${row('Causal', state.modelA.causal)}
          ${row('Assumptions', state.modelA.assumptions)}
        </div>
        <div>
          <strong style="color:var(--warn)">${bName}</strong>
          ${row('Stakeholders', state.modelB.stakeholders)}
          ${row('Jobs', state.modelB.jobs)}
          ${row('Outcomes', state.modelB.outcomes)}
          ${row('How', state.modelB.how)}
          ${row('Causal', state.modelB.causal)}
          ${row('Assumptions', state.modelB.assumptions)}
        </div>
      </div>
    </div>

    <div class="summary-section">
      <h3>Phase 2 \u2014 Analyze</h3>
      ${row('Love about ' + aName, state.loveA)}
      ${row('Love about ' + bName, state.loveB)}
      ${row('Must-keep from ' + aName, state.mustKeepA)}
      ${row('Must-keep from ' + bName, state.mustKeepB)}
      ${row('Genuine tensions', state.tensions)}
      ${row('Surface conflicts', state.surfaceConflicts)}
    </div>

    <div class="summary-section">
      <h3>Phase 3 \u2014 Remix</h3>
      ${row('Move', moveName)}
      ${row('Rationale', state.moveRationale)}
      ${row('Prototype', state.prototype)}
      ${row('From ' + aName, state.preservedA)}
      ${row('From ' + bName, state.preservedB)}
      ${row('Left behind', state.leftBehind)}
      ${row('Tension resolved', state.tensionResolved)}
    </div>

    <div class="summary-section">
      <h3>Phase 4 \u2014 Test</h3>
      ${row('Success conditions', state.conditions)}
      ${row('Risk conditions', state.risks)}
      ${row('Assumptions', state.assumptions)}
      ${row('Experiment', state.experiment)}
      ${row('Timeline', state.timeline)}
      ${row('Success looks like', state.successLooks)}
      ${row('Failure looks like', state.failureLooks)}
      ${row('Next step', state.nextStep)}
    </div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="goPhase(4)">\u2190 Edit Test</button>
      <div class="btn-row-right">
        <button class="btn btn-secondary" onclick="exportMarkdown()">\ud83d\udcc4 Export Markdown</button>
        <button class="btn btn-secondary" onclick="window.print()">\ud83d\udda8 Print</button>
        <button class="btn btn-primary" onclick="startOver()">Start New Session</button>
      </div>
    </div>
  </div>`;
}

function selectMove(key) {
  state.selectedMove = key;
  render();
}

function collectFields(phase) {
  switch(phase) {
    case 'intro':
      state.context = gv('ctx');
      break;
    case 'articulate':
      state.modelA = { name: gv('a_name'), stakeholders: gv('a_stake'), jobs: gv('a_jobs'), outcomes: gv('a_out'), how: gv('a_how'), causal: gv('a_causal'), assumptions: gv('a_assume') };
      state.modelB = { name: gv('b_name'), stakeholders: gv('b_stake'), jobs: gv('b_jobs'), outcomes: gv('b_out'), how: gv('b_how'), causal: gv('b_causal'), assumptions: gv('b_assume') };
      break;
    case 'analyze':
      state.loveA = gv('loveA'); state.loveB = gv('loveB');
      state.mustKeepA = gv('mustA'); state.mustKeepB = gv('mustB');
      state.tensions = gv('tensions'); state.surfaceConflicts = gv('surface');
      break;
    case 'remix':
      state.moveRationale = gv('moveRat'); state.prototype = gv('proto');
      state.preservedA = gv('presA'); state.preservedB = gv('presB');
      state.leftBehind = gv('leftBehind'); state.tensionResolved = gv('tensionRes');
      break;
    case 'test':
      state.conditions = gv('conds'); state.risks = gv('risks');
      state.assumptions = gv('assumpts'); state.experiment = gv('exper');
      state.timeline = gv('timeline'); state.successLooks = gv('succLooks');
      state.failureLooks = gv('failLooks'); state.nextStep = gv('nextStep');
      break;
  }
}

function gv(id) { const el = document.getElementById(id); return el ? el.value : ''; }

function saveAndNext(phase) { collectFields(phase); next(); }
function saveAndPrev(phase) { collectFields(phase); prev(); }

function exportMarkdown() {
  const aName = state.modelA.name || 'Model A';
  const bName = state.modelB.name || 'Model B';
  const moveName = { 'double-down': 'Double-Down', 'decomposition': 'Decomposition', 'hidden-gem': 'Hidden Gem' }[state.selectedMove] || state.selectedMove;
  let md = `# Integrative Thinking Summary\n\n`;
  md += `## Decision Context\n${state.context}\n\n`;
  md += `---\n\n## Phase 1 \u2014 Articulate\n\n`;
  md += `### ${aName}\n- **Stakeholders:** ${state.modelA.stakeholders}\n- **Jobs:** ${state.modelA.jobs}\n- **Outcomes:** ${state.modelA.outcomes}\n- **How:** ${state.modelA.how}\n- **Causal relationships:** ${state.modelA.causal}\n- **Assumptions:** ${state.modelA.assumptions}\n\n`;
  md += `### ${bName}\n- **Stakeholders:** ${state.modelB.stakeholders}\n- **Jobs:** ${state.modelB.jobs}\n- **Outcomes:** ${state.modelB.outcomes}\n- **How:** ${state.modelB.how}\n- **Causal relationships:** ${state.modelB.causal}\n- **Assumptions:** ${state.modelB.assumptions}\n\n`;
  md += `---\n\n## Phase 2 \u2014 Analyze\n\n`;
  md += `**Love about ${aName}:** ${state.loveA}\n\n**Love about ${bName}:** ${state.loveB}\n\n`;
  md += `**Must-keep from ${aName}:** ${state.mustKeepA}\n\n**Must-keep from ${bName}:** ${state.mustKeepB}\n\n`;
  md += `**Genuine tensions:** ${state.tensions}\n\n**Surface conflicts:** ${state.surfaceConflicts}\n\n`;
  md += `---\n\n## Phase 3 \u2014 Remix\n\n`;
  md += `**Integrative move:** ${moveName}\n\n**Rationale:** ${state.moveRationale}\n\n`;
  md += `**Prototype:** ${state.prototype}\n\n`;
  md += `**Preserved from ${aName}:** ${state.preservedA}\n\n**Preserved from ${bName}:** ${state.preservedB}\n\n`;
  md += `**Left behind:** ${state.leftBehind}\n\n**How the tension gets resolved:** ${state.tensionResolved}\n\n`;
  md += `---\n\n## Phase 4 \u2014 Test\n\n`;
  md += `**Conditions for success:** ${state.conditions}\n\n**Risk conditions:** ${state.risks}\n\n`;
  md += `**Assumptions to validate:** ${state.assumptions}\n\n`;
  md += `**Experiment:** ${state.experiment}\n\n**Timeline:** ${state.timeline}\n\n`;
  md += `**Success looks like:** ${state.successLooks}\n\n**Failure looks like:** ${state.failureLooks}\n\n`;
  md += `**Next step:** ${state.nextStep}\n`;

  const blob = new Blob([md], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'integrative-thinking-summary.md';
  a.click();
  URL.revokeObjectURL(url);
}

function startOver() {
  Object.keys(state).forEach(k => {
    if (typeof state[k] === 'string') state[k] = '';
    else if (typeof state[k] === 'object') Object.keys(state[k]).forEach(kk => state[k][kk] = '');
    else if (typeof state[k] === 'number') state[k] = 0;
  });
  state.phase = 0;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function render() {
  const app = document.getElementById('app');
  const renderers = [renderIntro, renderArticulate, renderAnalyze, renderRemix, renderTest, renderSummary];
  app.innerHTML = renderers[state.phase]();
  renderStepper();
}

render();
</script>
</body>
</html>
